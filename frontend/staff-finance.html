<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Финансы</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Финансы</b>
          <div class="muted" id="subtitle">зарплата · штрафы</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="grid mt-12">
      <div class="card">
        <b>Зарплата</b>
        <div class="muted mt-6">Сводка по месяцам и детализация по дням</div>
        <div class="row gap-8 mt-10">
          <button class="btn primary" id="goSalarySummary">Все заведения</button>
          <button class="btn" id="goSalary">Это заведение</button>
        </div>
      </div>

      <div class="card">
        <b>Штрафы / Списания / Премии</b>
        <div class="muted mt-6">История и детализация по дням</div>
        <div class="row mt-10">
          <button class="btn primary" id="goAdjustments">Открыть</button>
        </div>
      </div>
    </div>

    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>
    <div class="modal" id="modal">
      <div class="modal__backdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <b class="modal__title">JSON</b>
          <button class="btn" data-close>Закрыть</button>
        </div>
        <div class="modal__body"></div>
      </div>
    </div>
  </div>

  
  <script type="module">
import {
  applyTelegramTheme,
  mountCommonUI,
  ensureLogin,
  mountNav,
  getActiveVenueId,
  setActiveVenueId,
  getMyVenues,
  getMyVenuePermissions,
} from "/app.js";
import { permSetFromResponse, roleUpper, canViewReports as canViewReportsPerms } from "/permissions.js";

applyTelegramTheme();
mountCommonUI("finance");
await ensureLogin({ silent: true });

const params = new URLSearchParams(location.search);
const urlVenueId = params.get("venue_id");
if (urlVenueId) setActiveVenueId(urlVenueId);

await mountNav({ activeTab: "finance" });

const activeId = getActiveVenueId();

// Subtitle: show active venue name if possible
try {
  const venues = await getMyVenues();
  const v = venues.find((x) => String(x.id) === String(activeId));
  const subtitle = document.getElementById("subtitle");
  if (subtitle) subtitle.textContent = v?.name ? `заведение: ${v.name}` : "зарплата · штрафы";
} catch {}

// Guard: Finance is for users with report access
let canReports = false;
try {
  if (activeId) {
    const perms = await getMyVenuePermissions(activeId);
    const pset = permSetFromResponse(perms);
    const role = roleUpper(perms);
    canReports = canViewReportsPerms(pset, role, "");
  }
} catch {}

if (!canReports) {
  const qs = activeId ? `?venue_id=${encodeURIComponent(activeId)}` : "";
  location.replace(`/staff-salary.html${qs}`);
}

// Hide "All venues" option if only one venue
try {
  const venues = await getMyVenues().catch(() => []);
  const btnAll = document.getElementById("goSalarySummary");
  if (btnAll && (!Array.isArray(venues) || venues.length < 2)) btnAll.style.display = "none";
} catch {}

document.getElementById("goSalary")?.addEventListener("click", () => {
  const qs = activeId ? `?venue_id=${encodeURIComponent(activeId)}` : "";
  location.href = `/staff-salary.html${qs}`;
});
document.getElementById("goSalarySummary")?.addEventListener("click", () => {
  const p = new URLSearchParams();
  if (activeId) p.set("venue_id", String(activeId));
  p.set("scope", "all");
  location.href = `/staff-salary.html?${p.toString()}`;
});
document.getElementById("goAdjustments")?.addEventListener("click", () => {
  const qs = activeId ? `?venue_id=${encodeURIComponent(activeId)}` : "";
  location.href = `/staff-adjustments.html${qs}`;
});
  </script>
</body>
