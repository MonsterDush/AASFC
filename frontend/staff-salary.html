<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Зарплата</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Зарплата</b>
          <div class="muted" id="subtitle">сводка за месяц</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card">
      <div class="row row--between">
        <div class="row ai-center gap-10 month-controls">
          <button class="btn" id="monthPrev" aria-label="Предыдущий месяц">◀</button>
          <b id="monthLabel">…</b>
          <button class="btn" id="monthNext" aria-label="Следующий месяц">▶</button>
        </div>
      </div>

      <div class="row gap-8 mt-12">
        <button class="btn primary" id="btnSalaryThisVenue" disabled>Текущее заведение</button>
        <button class="btn" id="btnSalaryAllVenues">Все заведения</button>
      </div>

      <div class="itemcard mt-12">
        <div class="row jc-between row--between"><div class="muted">Начислено</div><b id="sumSalary">0</b></div>
          <div class="row jc-between row--between"><div class="muted">Чаевые</div><b id="sumTips">0</b></div>
          <div class="row jc-between row--between"><div class="muted">Премии</div><b id="sumBonuses">0</b></div>
          <div class="row jc-between row--between"><div class="muted">Штрафы</div><b id="sumPenalties">0</b></div>
          <div class="row" class="row row--between hidden" id="rowWriteoffs"><div class="muted">Списания</div><b id="sumWriteoffs">0</b></div>
          <div class="row divider-top mt-8 pt-10 row--between">
          <div class="muted">Итого</div><b id="sumTotal">0</b>
        </div>
      </div>

      
      <div class="itemcard mt-12">
        <div class="row row--between">
          <b>График по дням</b>
          <div class="muted small">Тапни на день для деталей</div>
        </div>
        <div id="monthChart" class="chart">
          <div class="skeleton"></div>
        </div>
      </div>

<div class="itemcard mt-12">
        <b>По дням</b>
        <div id="daysList"class="mt-10">
          <div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>
    </div>

    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>

    <div class="modal" id="modal">
      <div class="modal__backdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <div>
            <b class="modal__title">День</b>
            <div class="modal__subtitle" id="modalSubtitle"></div>
          </div>
          <button class="btn" data-close>Закрыть</button>
        </div>
        <div class="modal__body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/staff-salary.js"></script>
</body>
</html>
