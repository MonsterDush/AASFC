<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Сводка зарплаты</title>

  <!-- Page-specific polish (не ломает глобальные стили) -->
  <style>
    .salary-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .month-controls{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1 1 auto;
    }
    .month-title{
      display:flex;
      flex-direction:column;
      min-width:0;
      gap:2px;
    }
    #monthLabel{
      font-size:22px;
      line-height:1.15;
      letter-spacing:0.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .month-sub{
      font-size:12px;
      opacity:0.8;
    }
    .btn.iconbtn{
      width:44px;
      height:44px;
      padding:0;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }
    #monthPicker{
      width:140px;
      max-width:42vw;
    }

    .kpi-grid{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .kpi{
      border:1px solid var(--border);
      border-radius:18px;
      padding:12px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(6px);
    }
    .kpi .kpi-label{
      font-size:12px;
      opacity:0.85;
    }
    .kpi .kpi-value{
      margin-top:6px;
      font-size:20px;
      font-weight:800;
      letter-spacing:0.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .kpi.kpi-total{
      grid-column:1 / -1;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      padding:14px;
    }
    .kpi.kpi-total .kpi-value{
      font-size:24px;
    }

    .venues-head{
      margin-top:14px;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
    }
    .venues-grid{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    @media (min-width: 560px){
      .venues-grid{ grid-template-columns:1fr 1fr; }
    }

    .venue-card{
      border:1px solid var(--border);
      border-radius:18px;
      padding:12px;
      background: rgba(255,255,255,0.02);
      overflow:hidden;
    }
    .venue-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      min-width:0;
    }
    .venue-name{
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }
    .venue-net{
      text-align:right;
      flex:0 0 auto;
    }
    .venue-net .muted{
      font-size:12px;
    }
    .venue-net b{
      font-size:18px;
    }
    .chips{
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .chip{
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      background: rgba(255,255,255,0.02);
      white-space:nowrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Сводка зарплаты</b>
          <div class="muted" id="subtitle">по всем заведениям</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card">
      <div class="salary-toolbar">
        <div class="month-controls">
          <button class="btn iconbtn" id="monthPrev" aria-label="Предыдущий месяц">◀</button>

          <div class="month-title">
            <b id="monthLabel">…</b>
          </div>

          <button class="btn iconbtn" id="monthNext" aria-label="Следующий месяц">▶</button>
        </div>

        <button class="btn hidden" id="btnReload">Обновить</button>
      </div>

      <div class="kpi-grid">
        <div class="kpi">
          <div class="muted kpi-label">Начислено</div>
          <div class="kpi-value" id="tEarned">0</div>
        </div>

        <div class="kpi">
          <div class="muted kpi-label">Чаевые</div>
          <div class="kpi-value" id="tTips">0</div>
        </div>

        <div class="kpi">
          <div class="muted kpi-label">Премии</div>
          <div class="kpi-value" id="tBonuses">0</div>
        </div>

        <div class="kpi">
          <div class="muted kpi-label">Штрафы/Списания</div>
          <div class="kpi-value" id="tPenalties">0</div>
        </div>

        <div class="kpi kpi-total">
          <div class="muted kpi-label">Итого</div>
          <div class="kpi-value" id="tNet">0</div>
        </div>
      </div>

      <div class="venues-head">
        <b>По заведениям</b>
        <div class="muted small" id="venuesCount"></div>
      </div>

      <div id="venuesList" class="venues-grid">
        <div class="venue-card"><div class="skeleton"></div></div>
        <div class="venue-card"><div class="skeleton"></div></div>
      </div>
    </div>

    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>
  </div>

  <script type="module" src="/staff-salary-summary.js"></script>
</body>
</html>
