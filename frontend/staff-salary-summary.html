<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Сводка зарплаты</title>
</head>
<body>
  <div class="container">
    <div class="card" style="margin-top:16px">
      <b>Загрузка…</b>
      <div class="muted mt-6">Перенаправляем на единую страницу зарплаты.</div>
    </div>
  </div>

  <script type="module">
import { getActiveVenueId, setActiveVenueId } from "/app.js";
const p = new URLSearchParams(location.search);
const venueId = p.get("venue_id") || getActiveVenueId();
if (venueId) setActiveVenueId(venueId);
const month = p.get("month");
const q = new URLSearchParams();
if (venueId) q.set("venue_id", String(venueId));
q.set("scope", "all");
if (month) q.set("month", month);
location.replace(`/staff-salary.html?${q.toString()}`); // redirectToUnifiedSalary
  </script>
</body>
</html>
