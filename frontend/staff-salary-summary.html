<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Сводка зарплаты</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Сводка зарплаты</b>
          <div class="muted" id="subtitle">по всем заведениям</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card">
      <div class="row row--between">
        <div class="row ai-center gap-10">
          <button class="btn" id="monthPrev" aria-label="Предыдущий месяц">◀</button>
          <b id="monthLabel">…</b>
          <input class="input" id="monthPicker" type="month" />
          <button class="btn" id="monthNext" aria-label="Следующий месяц">▶</button>
        </div>
        <button class="btn" id="btnReload">Обновить</button>
      </div>

      <div class="itemcard mt-12">
        <div class="row jc-between row--between"><div class="muted">Начислено</div><b id="tEarned">0</b></div>
        <div class="row jc-between row--between"><div class="muted">Премии</div><b id="tBonuses">0</b></div>
        <div class="row jc-between row--between"><div class="muted">Штрафы/Списания</div><b id="tPenalties">0</b></div>
        <div class="row divider-top mt-8 pt-10 row--between">
          <div class="muted">Итого</div><b id="tNet">0</b>
        </div>
      </div>

      <div class="itemcard mt-12">
        <b>По заведениям</b>
        <div id="venuesList"class="mt-10">
          <div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>

      <div class="muted mt-10 small">
        Начисление считается по сменам, для которых есть отчёт (DailyReport). Штрафы/премии берутся из корректировок за месяц.
      </div>
    </div>

    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>
  </div>

  <script type="module" src="/staff-salary-summary.js"></script>
</body>
</html>
