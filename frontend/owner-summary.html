<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Сводка</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Сводка</b>
          <div class="muted" id="subtitle">общая выручка и траты</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

        <div class="card">
      <div class="row" style="justify-content:space-between; align-items:center; gap:12px;">
        <div>
          <b>Сводка</b>
          <div class="muted mt-6">общая выручка и траты</div>
        </div>
        <div class="row" style="gap:8px; flex-wrap:nowrap;">
          <div class="muted" style="font-size:12px;">Месяц</div>
          <input id="summaryMonthPick" type="month" style="width:auto; min-width:160px;" />
        </div>
      </div>

      <div class="grid mt-12">
        <div class="itemcard" id="turnoverCard">
          <div class="row" style="justify-content:space-between; gap:12px; align-items:center;">
            <div>
              <div class="muted" style="margin-bottom:6px;">Выручка за месяц</div>
              <div class="h2" id="turnoverTotal">—</div>
            </div>
            <button class="btn" id="turnoverDetailsBtn">Подробнее</button>
          </div>
        </div>

        <div class="itemcard">
          <div class="muted">Траты за месяц</div>
          <div class="h2 mt-6">—</div>
        </div>
      </div>

      <div class="itemcard mt-12">
        <b>Список трат</b>
        <div class="muted mt-6">—</div>
      </div>
    </div></div>

    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>
    <div class="modal" id="modal">
      <div class="modal__backdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <b class="modal__title">JSON</b>
          <button class="btn" data-close>Close</button>
        </div>
        <div class="modal__body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/owner-summary.js"></script>
</body>
</html>
