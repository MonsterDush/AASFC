<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Сводка</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Сводка</b>
          <div class="muted" id="subtitle">выручка, расходы и прибыль</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card finance-toolbar">
      <div class="row" style="justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
        <div>
          <b>Финансовая сводка</b>
          <div class="muted mt-6">данные по закрытым отчётам и учтённым расходам</div>
        </div>
        <div class="row" style="gap:8px; flex-wrap:wrap; align-items:center;">
          <input id="summaryMonthPick" type="month" style="width:auto; min-width:160px;" />
          <button class="btn" id="openRevenueBtn">Выручка</button>
          <button class="btn" id="openExpensesBtn">Расходы</button>
        </div>
      </div>

      <div class="finance-stats mt-12">
        <div class="itemcard finance-stat" id="revenueCard">
          <div class="finance-stat__label">Выручка</div>
          <div class="finance-stat__value" id="summaryRevenue">—</div>
        </div>

        <div class="itemcard finance-stat" id="expensesCard">
          <div class="finance-stat__label">Расходы</div>
          <div class="finance-stat__value" id="summaryExpenses">—</div>
        </div>

        <div class="itemcard finance-stat" id="profitCard">
          <div class="finance-stat__label">Прибыль</div>
          <div class="finance-stat__value" id="summaryProfit">—</div>
        </div>

        <div class="itemcard finance-stat">
          <div class="finance-stat__label">Маржинальность</div>
          <div class="finance-stat__value" id="summaryMargin">—</div>
        </div>
      </div>

      <div class="itemcard mt-12" id="summaryMetaCard">
        <div class="row" style="justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
          <div>
            <b>Период</b>
            <div class="muted mt-6" id="summaryPeriodText">—</div>
          </div>
          <div class="muted" id="summaryHint">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="wrap">
      <div id="nav"></div>
    </div>
  </div>

  <div class="toast" id="toast"><div class="toast__text"></div></div>
  <div class="modal" id="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="modal__head">
        <b class="modal__title">JSON</b>
        <button class="btn" data-close>Close</button>
      </div>
      <div class="modal__body"></div>
    </div>
  </div>

  <script type="module" src="/owner-summary.js"></script>
</body>
</html>
