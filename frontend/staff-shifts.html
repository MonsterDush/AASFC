<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
<style>
  /* ===== Shifts calendar: Week view + compact badges ===== */
  #calendarView.shift-toggle { display:inline-flex; }

  .cal .cal-badges{
    margin-top: 8px;
    display:flex;
    flex-direction:column;
    gap:6px;
    overflow:hidden;
    min-height:0;
  }

  /* Badge-like compact lines */
  .cal .cal-line{
    border-radius: 10px;
    padding: 4px 8px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal .cal-line[data-icolor="1"]{
    border-left: 3px solid rgb(var(--line-rgb));
    padding-left: 8px;
  }
  .cal .cal-line--more{ opacity:.75; }

  /* Week layout */
  .cal.is-week .cal-body{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap:10px;
  }
  .cal.is-week .cal-cell{
    height: 160px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
    min-height: 0;
  }

  /* 2 columns for badges inside a fixed-height day */
  .cal.is-week .cal-badges{
    margin-top: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: 8px;
    row-gap: 6px;
    overflow: hidden;
    min-height: 0;
    flex: 1 1 auto;
  }
  /* allow grid items to shrink (needed for 2 columns on mobile with nowrap) */
  .cal.is-week .cal-badges > *{ min-width:0; }
  .cal.is-week .cal-line{ min-width:0; }
  .cal.is-week .cal-line--more{ grid-column: 1 / -1; }
  .cal-weektop{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    min-width:0;
  }
  .cal-weektop .cal-weekname{
    font-size:12px;
    opacity:.8;
    line-height:1.1;
  }
  .cal-weektop .cal-weekdate{
    font-weight:800;
    line-height:1.15;
  }
  .cal-weektop .cal-daymeta{
    text-align:right;
    font-size:12px;
    opacity:.8;
    white-space:nowrap;
  }

  /* Mobile: show week as a readable vertical list (идеально для Mini App) */
  @media (max-width: 560px){
    .cal.is-week .cal-body{ grid-template-columns: 1fr; }
    .cal.is-week .cal-cell{ height: 150px; padding: 8px; }

    /* Auto columns inside a day: 1 col on narrow phones, 2 cols when enough width */
    .cal.is-week .cal-badges{
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      column-gap: 6px;
      row-gap: 5px;
    }

    .cal.is-week .cal-line{
      padding: 3px 6px;
      font-size: 11px;
      border-radius: 9px;
    }
  }
</style>
  <title>Axelio · Смены</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Смены</b>
          <div class="muted" id="subtitle">календарь и назначения</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card">
      <div class="row row--between">
        <div class="row ai-center gap-10 month-controls">
          <button class="btn" id="monthPrev" aria-label="Предыдущий месяц">◀</button>
          <b id="monthLabel">…</b>
          <button class="btn" id="monthNext" aria-label="Следующий месяц">▶</button>
        </div>
        <div class="row ai-center gap-10 row--center">
<div id="calendarView" class="shift-toggle">
  <button type="button" id="viewMonth">Месяц</button>
  <button type="button" id="viewWeek">Неделя</button>
</div>
          <div id="calendarMode" class="shift-toggle hidden">
            <button type="button" id="modeAll">Все</button>
            <button type="button" id="modeMine">Только мои</button>
            <button type="button" id="modeGlobal">Общий</button>
          </div>
          <button class="btn" id="btnLegend" type="button">Легенда</button>
</div>

      </div>

      <div id="calGrid" class="cal mt-10"></div>
    </div>
    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>
    <div class="modal" id="modal">
      <div class="modal__backdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <div>
            <b class="modal__title">Подтверждение</b>
            <div class="modal__subtitle" id="modalSubtitle"></div>
          </div>
          <button class="btn" id="btnOpenAdjustments">Списания дня</button>
          <button class="btn" data-close>Закрыть</button>
</div>

        <div class="modal__body"></div>
      </div>
    </div>
  </div>

  
    <div class="modal" id="legendModal">
      <div class="modal__backdrop" data-close-legend></div>
      <div class="modal__panel">
        <div class="modal__head">
          <div class="minw-0">
            <b class="modal__title">Легенда интервалов</b>
            <div class="modal__subtitle">Цвета закреплены за интервалами</div>
          </div>
          <button class="btn" type="button" data-close-legend>Закрыть</button>
        </div>
        <div class="modal__body" id="legendBody"></div>
      </div>
    </div>

  <div id="shiftsRoot"class="hidden"></div>
  <script type="module" src="/staff-shifts.js"></script>
</body>
</html>
