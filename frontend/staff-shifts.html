<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
<style>
  /* ===== Shifts calendar: Week view + compact badges (v3) ===== */
  #calendarView.shift-toggle { display:inline-flex; }

  /* Week layout (desktop: 7 columns, mobile: vertical list) */
  .cal.is-week .cal-body{
    display:grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap:10px;
  }
  @media (max-width: 560px){
    .cal.is-week .cal-body{ grid-template-columns: 1fr; }
  }

  /* Week day cell: grows by content, but capped */
  .cal.is-week .cal-cell{
    height:auto;
    min-height:64px;
    max-height:160px;
    padding: 10px;
    display:flex;
    flex-direction:column;
    gap:8px;
    overflow:hidden;
    min-width:0;
  }
  .cal.is-week .cal-cell.is-empty{
    min-height:64px;
    max-height:64px;
    opacity:.85;
  }
  @media (max-width: 560px){
    .cal.is-week .cal-cell{ max-height:150px; padding:8px; }
    .cal.is-week .cal-cell.is-empty{ max-height:56px; min-height:56px; }
  }

  /* Week header inside a cell */
  .cal-weektop{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    min-width:0;
  }
  .cal-weektop .cal-weekname{
    font-size:12px;
    opacity:.8;
    line-height:1.1;
  }
  .cal-weektop .cal-weekdate{
    font-weight:800;
    line-height:1.15;
  }
  .cal-weektop .cal-daymeta{
    text-align:right;
    font-size:12px;
    opacity:.8;
    white-space:nowrap;
  }

  /* Badges: AUTO columns (1 or 2 decided by JS by setting data-cols) */
  .cal.is-week .cal-badges{
    margin-top:0;
    display:grid;
    grid-template-columns: 1fr;              /* default */
    column-gap: 8px;
    row-gap: 6px;
    overflow:hidden;
    min-width:0;
  }
  .cal.is-week .cal-badges[data-cols="2"]{
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  /* Make labels compact and shrinkable */
  .cal.is-week .cal-badges > *{ min-width:0; }
  .cal.is-week .cal-line{ min-width:0; }
  .cal .cal-line{
    border-radius: 10px;
    padding: 4px 8px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (max-width: 560px){
    .cal .cal-line{
      padding: 3px 6px;
      font-size: 11px;
      border-radius: 9px;
    }
  }

  /* "+N" hint spans full width */
  .cal.is-week .cal-line--more{ grid-column: 1 / -1; opacity:.75; }
</style>
  <title>Axelio · Смены</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Смены</b>
          <div class="muted" id="subtitle">календарь и назначения</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card">
      <div class="row row--between">
        <div class="row ai-center gap-10 month-controls">
          <button class="btn" id="monthPrev" aria-label="Предыдущий месяц">◀</button>
          <b id="monthLabel">…</b>
          <button class="btn" id="monthNext" aria-label="Следующий месяц">▶</button>
        </div>
        <div class="row ai-center gap-10 row--center">
<div id="calendarView" class="shift-toggle">
  <button type="button" id="viewMonth">Месяц</button>
  <button type="button" id="viewWeek">Неделя</button>
</div>
          <div id="calendarMode" class="shift-toggle hidden">
            <button type="button" id="modeAll">Все</button>
            <button type="button" id="modeMine">Только мои</button>
            <button type="button" id="modeGlobal">Общий</button>
          </div>
          <button class="btn" id="btnLegend" type="button">Легенда</button>
</div>

      </div>

      <div id="calGrid" class="cal mt-10"></div>
    </div>
    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>
    <div class="modal" id="modal">
      <div class="modal__backdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <div>
            <b class="modal__title">Подтверждение</b>
            <div class="modal__subtitle" id="modalSubtitle"></div>
          </div>
          <button class="btn" id="btnOpenAdjustments">Списания дня</button>
          <button class="btn" data-close>Закрыть</button>
</div>

        <div class="modal__body"></div>
      </div>
    </div>
  </div>

  
    <div class="modal" id="legendModal">
      <div class="modal__backdrop" data-close-legend></div>
      <div class="modal__panel">
        <div class="modal__head">
          <div class="minw-0">
            <b class="modal__title">Легенда интервалов</b>
            <div class="modal__subtitle">Цвета закреплены за интервалами</div>
          </div>
          <button class="btn" type="button" data-close-legend>Закрыть</button>
        </div>
        <div class="modal__body" id="legendBody"></div>
      </div>
    </div>

  <div id="shiftsRoot"class="hidden"></div>
  <script type="module" src="/staff-shifts.js"></script>
</body>
</html>
