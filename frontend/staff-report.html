<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Отчёты</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Отчёты</b>
          <div class="muted" id="subtitle">по дням</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card">
      <div class="row row--between">
        <div class="row ai-center gap-10 month-controls">
          <button class="btn" id="monthPrev">◀</button>
          <b id="monthLabel">…</b>
          <button class="btn" id="monthNext">▶</button>
        </div>
          <div class="muted small">Кликни на день, чтобы посмотреть или заполнить отчёт</div>
        </div>
        <div id="calGrid" class="cal mt-10"></div>
      </div>
    </div>
    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"><div class="toast__text"></div></div>

  <div class="modal" id="modal">
      <div class="modal__backdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <div>
            <b class="modal__title">Отчет</b>
            <div class="modal__subtitle" id="modalSubtitle"></div>
          </div>
          <button class="btn" data-close>Закрыть</button>
        </div>

        <div class="modal__body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/staff-report.js"></script>

  <div class="modal" id="photoModal">
      <div class="modal__backdrop" data-close-ph></div>
      <div class="modal__panel modal__panel--wide">
        <div class="modal__head">
          <div class="minw-0">
            <b class="modal__title" id="photoTitle">Фото</b>
            <div class="modal__subtitle" id="photoSubtitle"></div>
          </div>
          <button class="btn" data-close-ph>Закрыть</button>
        </div>
        <div class="modal__body">
          <div class="row gap-8 row--between">
            <div class="row ai-center gap-8">
              <button class="btn" id="phPrev">◀</button>
              <button class="btn" id="phNext">▶</button>
              <div class="muted" id="phCounter"></div>
            </div>
            <div class="row ai-center gap-8">
              <a class="btn" id="phDownload" href="#" download>Скачать</a>
              <button class="btn danger" id="phDelete">Удалить</button>
            </div>
          </div>
          <div class="photoStage mt-10">
            <img id="phImg" alt="photo" class="photoStage__img"/>
          </div>
        </div>
      </div>
  </div>

</body>
</html>
