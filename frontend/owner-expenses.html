<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Расходы</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b id="title">Расходы</b>
          <div class="muted" id="subtitle">учёт трат</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card finance-toolbar">
      <div class="row" style="justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
        <div>
          <b>Расходы</b>
          <div class="muted mt-6">учтённые траты по выбранному месяцу</div>
        </div>
        <div class="row" style="gap:8px; flex-wrap:wrap; align-items:center;">
          <input id="expensesMonthPick" type="month" style="width:auto; min-width:160px;" />
          <a class="btn ghost" id="openRecurringExpensesBtn" href="#">Регулярные</a>
          <a class="btn ghost" id="openExpenseCategoriesBtn" href="#">Категории</a>
          <a class="btn ghost" id="openSuppliersBtn" href="#">Поставщики</a>
        </div>
      </div>

      <div class="row mt-12" style="gap:8px; flex-wrap:wrap; align-items:center;">
        <button class="btn" id="addExpenseBtn">Добавить расход</button>
        <button class="btn ghost" id="addCategoryBtn">Добавить категорию</button>
        <button class="btn ghost" id="addSupplierBtn">Добавить поставщика</button>
      </div>

      <div class="finance-filters mt-12">
        <select id="expenseCategoryFilter">
          <option value="">Все категории</option>
        </select>
        <select id="expenseSupplierFilter">
          <option value="">Все поставщики</option>
        </select>
      </div>

      <div class="finance-stats mt-12">
        <div class="itemcard finance-stat">
          <div class="finance-stat__label">Всего расходов</div>
          <div class="finance-stat__value" id="expensesTotalMinor">—</div>
        </div>
        <div class="itemcard finance-stat">
          <div class="finance-stat__label">Записей</div>
          <div class="finance-stat__value" id="expensesCount">—</div>
        </div>
      </div>

      <div class="itemcard mt-12">
        <div class="row" style="justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
          <b>Список расходов</b>
          <div class="muted" id="expensesState">—</div>
        </div>
        <div id="expensesList" class="expense-list mt-12"></div>
      </div>
    </div>

    <div class="nav">
      <div class="wrap">
        <div id="nav"></div>
      </div>
    </div>

    <div class="toast" id="toast"><div class="toast__text"></div></div>
    <div class="modal" id="modal">
      <div class="modal__backdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <b class="modal__title">JSON</b>
          <button class="btn" data-close>Close</button>
        </div>
        <div class="modal__body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/owner-expenses.js"></script>
</body>
</html>
