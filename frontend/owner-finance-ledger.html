<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <title>Axelio · Финансовые движения</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b>Финансовые движения</b>
          <div class="muted">ledger, переводы между типами оплат и детализация балансов</div>
        </div>
      </div>
      <div class="userpill" data-userpill>…</div>
    </div>

    <div class="card finance-toolbar">
      <div class="row" style="justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
        <div>
          <b>Журнал финансовых движений</b>
          <div class="muted mt-6">Выручка, расходы, корректировки и переводы между оплатами</div>
        </div>
        <div class="row" style="gap:8px; flex-wrap:wrap; align-items:center;">
          <input id="ledgerMonthPick" type="month" style="width:auto; min-width:160px;" />
          <select id="ledgerPaymentMethodPick" style="width:auto; min-width:170px;">
            <option value="">Все оплаты</option>
          </select>
          <select id="ledgerKindPick" style="width:auto; min-width:170px;">
            <option value="">Все типы</option>
            <option value="REVENUE">Выручка</option>
            <option value="EXPENSE">Расходы</option>
            <option value="BALANCE_ADJUSTMENT">Корректировки баланса</option>
            <option value="TRANSFER">Переводы</option>
            <option value="PAYROLL">ФОТ</option>
            <option value="ADJUSTMENT">Корректировки</option>
            <option value="REFUND">Возвраты</option>
          </select>
          <button class="btn" id="addTransferBtn" style="display:none;">Перевод</button>
        </div>
      </div>

      <div class="finance-stats mt-12">
        <div class="itemcard finance-stat">
          <div class="finance-stat__label">Доход за фильтр</div>
          <div class="finance-stat__value" id="ledgerIncomeTotal">—</div>
        </div>
        <div class="itemcard finance-stat">
          <div class="finance-stat__label">Расход за фильтр</div>
          <div class="finance-stat__value" id="ledgerExpenseTotal">—</div>
        </div>
        <div class="itemcard finance-stat">
          <div class="finance-stat__label">Записей</div>
          <div class="finance-stat__value" id="ledgerCount">—</div>
        </div>
      </div>

      <div class="itemcard mt-12">
        <div class="row" style="justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
          <div>
            <b>Ledger entries</b>
            <div class="muted mt-6" id="ledgerHint">—</div>
          </div>
        </div>
        <div id="ledgerEntriesList" class="mt-12"></div>
      </div>

      <div class="itemcard mt-12">
        <div class="row" style="justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
          <div>
            <b>Переводы между оплатами</b>
            <div class="muted mt-6" id="transferHint">—</div>
          </div>
        </div>
        <div id="transferList" class="mt-12"></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="wrap">
      <div id="nav"></div>
    </div>
  </div>

  <div class="toast" id="toast"><div class="toast__text"></div></div>
  <div class="modal" id="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="modal__head">
        <b class="modal__title">JSON</b>
        <button class="btn" data-close>Закрыть</button>
      </div>
      <div class="modal__body"></div>
    </div>
  </div>

  <script type="module" src="/owner-finance-ledger.js"></script>
</body>
</html>
