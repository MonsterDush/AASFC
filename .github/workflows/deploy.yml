name: Deploy

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets presence
        run: |
          if [ -z "${{ secrets.SSH_KEY }}" ]; then
            echo "SSH_KEY is empty"
            exit 1
          else
            echo "SSH_KEY is present"
          fi

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if [ "${{ github.ref_name }}" = "develop" ]; then
              APP_ROOT=/var/www/axelio/dev
              REPO_DIR=$APP_ROOT/repo
              BACKEND_DIR=$REPO_DIR/backend
              VENV_BIN=$APP_ROOT/venv/bin

              cd "$REPO_DIR"
              git fetch origin
              git checkout develop
              git pull origin develop

              "$VENV_BIN/pip" install -r "$BACKEND_DIR/requirements.txt"

              cd "$BACKEND_DIR"
              "$VENV_BIN/alembic" upgrade head
              "$VENV_BIN/python" -m app.core.sync_permissions

              sudo systemctl restart axelio-api-dev
              sudo systemctl reload nginx
              echo "Deployed develop -> dev"
            else
              APP_ROOT=/var/www/axelio/prod
              REPO_DIR=$APP_ROOT/repo
              BACKEND_DIR=$REPO_DIR/backend
              VENV_BIN=$APP_ROOT/venv/bin

              cd "$REPO_DIR"
              git fetch origin
              git checkout main
              git pull origin main

              "$VENV_BIN/pip" install -r "$BACKEND_DIR/requirements.txt"

              cd "$BACKEND_DIR"
              "$VENV_BIN/alembic" upgrade head
              "$VENV_BIN/python" -m app.core.sync_permissions

              sudo systemctl restart axelio-api-prod
              sudo systemctl reload nginx
              echo "Deployed main -> prod"
            fi
